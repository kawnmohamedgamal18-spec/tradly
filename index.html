<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#1DA8C8;--gold2:#40E0C0;
  --bg:#0A0F1A;--card:#0D1525;--border:#1A2640;
  --text:#E8F4F8;--muted:#5A7A8A;--radius:16px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Tajawal',sans-serif;line-height:1.6;overflow-x:hidden}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal-box{background:#0D1525;border:1px solid #1A2640;border-radius:20px;padding:40px;width:100%;max-width:480px;position:relative;animation:slideUp .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 rgba(29,168,200,0.3)}50%{box-shadow:0 0 0 12px rgba(29,168,200,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}30%{transform:translate(3%,-1%)}50%{transform:translate(-1%,2%)}70%{transform:translate(2%,3%)}90%{transform:translate(-3%,1%)}}
.fade-in{opacity:0;transform:translateY(32px);transition:opacity .75s ease,transform .75s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}
.fade-in-delay-1{transition-delay:.1s}.fade-in-delay-2{transition-delay:.2s}
.fade-in-delay-3{transition-delay:.3s}.fade-in-delay-4{transition-delay:.4s}
.grain-overlay::after{content:'';position:fixed;inset:-100%;width:300%;height:300%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;animation:grain 8s steps(10) infinite;z-index:9999;opacity:0.4}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-weight:700;padding:14px 32px;border-radius:50px;border:none;cursor:pointer;font-size:15px;font-family:'Syne','Tajawal',sans-serif;letter-spacing:.02em;transition:all .3s ease;animation:pulseGold 3s infinite;text-decoration:none;display:inline-block}
.btn-gold:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 40px rgba(29,168,200,0.4)}
.btn-outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold);padding:13px 32px;border-radius:50px;cursor:pointer;font-size:15px;font-family:'Syne','Tajawal',sans-serif;font-weight:600;letter-spacing:.02em;transition:all .3s ease;text-decoration:none;display:inline-block}
.btn-outline:hover{background:rgba(29,168,200,0.08);transform:translateY(-2px)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;transition:all .4s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(29,168,200,0.04),transparent);opacity:0;transition:opacity .4s}
.card:hover::before{opacity:1}
.card:hover{border-color:rgba(29,168,200,0.3);transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,0.5)}
.section-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(29,168,200,0.08);border:1px solid rgba(29,168,200,0.2);color:var(--gold);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:6px 16px;border-radius:50px;margin-bottom:24px;font-family:'Syne','Tajawal',sans-serif}
.heading-xl{font-family:'Syne','Tajawal',sans-serif;font-size:clamp(32px,5vw,76px);font-weight:800;line-height:1.05;letter-spacing:-.02em;color:var(--text)}
.heading-lg{font-family:'Syne','Tajawal',sans-serif;font-size:clamp(24px,3.5vw,48px);font-weight:700;line-height:1.1;letter-spacing:-.01em}
.gold-text{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.divider-line{width:60px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:20px 0}
[dir="rtl"] .divider-line{background:linear-gradient(270deg,var(--gold),transparent)}
input,textarea{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:14px 18px;font-size:15px;font-family:'DM Sans','Tajawal',sans-serif;width:100%;transition:border .3s;outline:none}
input:focus,textarea:focus{border-color:rgba(29,168,200,0.5)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{min-height:120px;resize:vertical}
label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500}
.nav-link{color:rgba(232,244,248,0.6);text-decoration:none;font-size:14px;font-weight:500;cursor:pointer;transition:color .2s;padding:4px 0}
.nav-link:hover,.nav-link.active{color:var(--text)}
/* Grid */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
@media(max-width:1024px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .hide-mobile{display:none!important}
  .section{padding:64px 0!important}
  .heading-xl{font-size:clamp(28px,8vw,42px)!important}
  .process-connector{display:none!important}
  .mobile-menu-btn{display:flex!important}
}
@media(max-width:480px){
  .grid-4{grid-template-columns:1fr}
  .btn-gold,.btn-outline{padding:12px 22px;font-size:14px}
  .card{padding:20px}
  .modal-box{padding:24px}
}
.section{padding:100px 0}
.container{max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,32px)}
.text-center{text-align:center}
.flex{display:flex}.items-center{align-items:center}
.justify-center{justify-content:center}.justify-between{justify-content:space-between}
.flex-col{flex-direction:column}.wrap{flex-wrap:wrap}.relative{position:relative}.overflow-hidden{overflow:hidden}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.mb-48{margin-bottom:48px}.mb-64{margin-bottom:64px}
/* WhatsApp */
.whatsapp-widget{position:fixed;bottom:28px;right:28px;z-index:1000;width:54px;height:54px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 32px rgba(37,211,102,0.35);transition:transform .3s,box-shadow .3s;text-decoration:none}
.whatsapp-widget:hover{transform:scale(1.1);box-shadow:0 12px 40px rgba(37,211,102,0.55)}
[dir="rtl"] .whatsapp-widget{right:auto;left:28px}
/* Hero */
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(29,168,200,0.10) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(64,224,192,0.05) 0%,transparent 60%)}
.hero-grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(29,168,200,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(29,168,200,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse at center,black 20%,transparent 80%)}
/* Process */
.process-step{position:relative;text-align:center;padding:40px 16px}
.process-num{font-family:'Syne',sans-serif;font-size:clamp(48px,7vw,72px);font-weight:800;color:rgba(29,168,200,0.08);line-height:1;position:absolute;top:0;left:50%;transform:translateX(-50%)}
.process-icon{width:56px;height:56px;background:rgba(29,168,200,0.1);border:1px solid rgba(29,168,200,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:48px auto 20px;font-size:22px}
.process-connector{position:absolute;top:76px;left:calc(50% + 28px);right:calc(-50% + 28px);height:1px;background:linear-gradient(90deg,rgba(29,168,200,0.3),rgba(29,168,200,0.05))}
[dir="rtl"] .process-connector{background:linear-gradient(270deg,rgba(29,168,200,0.3),rgba(29,168,200,0.05))}
/* Reviews */
.review-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.review-stars{color:var(--gold);margin-bottom:12px;font-size:14px}
.review-text{font-size:15px;line-height:1.7;margin-bottom:20px;color:rgba(232,244,248,0.8)}
.review-author{font-size:13px;font-weight:600;color:var(--gold)}
.stat-number{font-family:'Syne','Tajawal',sans-serif;font-size:clamp(36px,5vw,52px);font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* Lang toggle */
.lang-toggle{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:50px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:all .3s}
.lang-toggle:hover{border-color:rgba(29,168,200,0.3);background:rgba(29,168,200,0.06)}
/* Page hero */
.page-hero{padding:140px 0 80px;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(29,168,200,0.09) 0%,transparent 60%);text-align:center}
@media(max-width:768px){.page-hero{padding:100px 0 60px}}
/* Notification */
.notification{position:fixed;top:90px;right:24px;background:rgba(29,168,200,0.15);border:1px solid rgba(29,168,200,0.3);color:var(--gold);padding:14px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:9998;animation:fadeSlideDown .4s ease}
[dir="rtl"] .notification{right:auto;left:24px}
/* Service detail */
.service-detail-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .4s}
.service-detail-card:hover{border-color:rgba(29,168,200,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.service-detail-header{padding:32px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(29,168,200,0.05),transparent)}
.service-detail-body{padding:32px}
.benefit-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:14px}
.benefit-check{color:var(--gold);font-size:16px}
/* Social SVG icons */
.social-btn{display:flex;align-items:center;gap:10px;border-radius:10px;padding:12px 20px;text-decoration:none;color:var(--text);font-size:14px;font-weight:600;transition:all .3s;border:1px solid}
.social-btn:hover{transform:translateY(-2px)}
/* Team */
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center}
.team-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(29,168,200,0.3),rgba(64,224,192,0.1));margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;border:2px solid rgba(29,168,200,0.2)}
/* Mobile menu */
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px}
@media(min-width:769px){.mobile-menu-btn{display:none!important}}
/* Close btn */
.close-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.06);border:none;color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.close-btn:hover{background:rgba(255,255,255,0.12);color:var(--text)}
[dir="rtl"] .close-btn{right:auto;left:16px}
/* Sidebar */
.sidebar-nav{display:flex;flex-direction:column;gap:4px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:all .2s;border:none;background:transparent;text-align:start;width:100%}
.sidebar-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.sidebar-item.active{background:rgba(29,168,200,0.1);color:var(--gold)}
.tab-bar{display:flex;gap:4px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:32px}
.tab{flex:1;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;text-align:center;color:var(--muted);border:none;background:transparent}
.tab.active{background:rgba(29,168,200,0.12);color:var(--gold)}
.progress-bar-bg{height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px;transition:width 1s ease}
.status-badge{padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;letter-spacing:.04em}
.status-pending{background:rgba(255,193,7,0.12);color:#FFC107}
.status-inProgress{background:rgba(33,150,243,0.12);color:#64B5F6}
.status-completed{background:rgba(76,175,80,0.12);color:#81C784}
.star-rating{display:flex;gap:4px;cursor:pointer}
.star{font-size:24px;transition:transform .2s}.star:hover{transform:scale(1.2)}
.star.filled{color:var(--gold)}.star.empty{color:#333}
.map-placeholder{width:100%;height:180px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;margin-top:24px}
</style>
</head>

function useInView(threshold=0.12){
  const ref=useRef(null);
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVisible(true)},{threshold});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return[ref,visible];
}

// ── CONTACT MODAL ──────────────────────────────
function ContactModal({ lang, onClose }) {
  const t = T[lang];
  const m = t.modal;
  const [form, setForm] = useState({ name:"", phone:"", msg:"" });
  const [status, setStatus] = useState("idle"); // idle | sending | sent | error

  const handleSend = async () => {
    if (!form.name || !form.phone || !form.msg) return;
    setStatus("sending");
    try {
      // Using mailto as fallback since no backend — opens email client
      const subject = encodeURIComponent(`New Project Request from ${form.name}`);
      const body = encodeURIComponent(
        `Name: ${form.name}\nPhone: ${form.phone}\n\nMessage:\n${form.msg}`
      );
      window.location.href = `mailto:info.tradly@gmail.com?subject=${subject}&body=${body}`;
      setStatus("sent");
      setTimeout(() => { setStatus("idle"); setForm({name:"",phone:"",msg:""}); onClose(); }, 2500);
    } catch(e) {
      setStatus("error");
    }
  };

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-box">
        <button className="close-btn" onClick={onClose}>×</button>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <TCLogo id="tcModal" size={44}/>
          <h2 style={{ fontFamily:"Syne,Tajawal,sans-serif", fontWeight:800, fontSize:22, marginTop:12 }}>{m.title}</h2>
          <p style={{ color:"var(--muted)", fontSize:14, marginTop:6 }}>{m.sub}</p>
        </div>
        {status==="sent" ? (
          <div style={{ textAlign:"center", padding:"24px 0", color:GOLD2, fontFamily:"Syne,Tajawal,sans-serif", fontWeight:600, fontSize:16 }}>{m.sent}</div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div>
              <label>{m.name}</label>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={m.namePh}/>
            </div>
            <div>
              <label>{m.phone}</label>
              <input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder={m.phonePh} type="tel"/>
            </div>
            <div>
              <label>{m.msg}</label>
              <textarea value={form.msg} onChange={e=>setForm({...form,msg:e.target.value})} placeholder={m.msgPh}/>
            </div>
            <button
              className="btn-gold"
              onClick={handleSend}
              disabled={status==="sending"}
              style={{ width:"100%", marginTop:4, opacity:status==="sending"?0.7:1 }}
            >
              {status==="sending" ? m.sending : m.send}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────
function App() {
  const [lang, setLang] = useState("en");
  const [page, setPage] = useState("home");
  const [reviews] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const dir = lang==="ar"?"rtl":"ltr";

  useEffect(()=>{ window.scrollTo({top:0,behavior:"smooth"}); },[page]);

  const setLangWithDir = (l) => {
    setLang(l);
    document.documentElement.setAttribute("dir",l==="ar"?"rtl":"ltr");
  };

  const openCTA = () => setShowModal(true);

  return (
    <LangContext.Provider value={{lang,t:T[lang]}}>
      <div dir={dir} className="grain-overlay" style={{ minHeight:"100vh", fontFamily:lang==="ar"?"Tajawal,sans-serif":"DM Sans,sans-serif" }}>
        <Navbar page={page} setPage={setPage} lang={lang} setLang={setLangWithDir} onCTA={openCTA}/>
        {page==="home"&&<HomePage setPage={setPage} lang={lang} reviews={reviews} onCTA={openCTA}/>}
        {page==="about"&&<AboutPage lang={lang} onCTA={openCTA}/>}
        {page==="services"&&<ServicesPage lang={lang} onCTA={openCTA}/>}
        {page==="contact"&&<ContactPage lang={lang} onCTA={openCTA}/>}
        {page!=="login"&&page!=="dashboard"&&<Footer setPage={setPage} lang={lang}/>}
        <WhatsAppWidget/>
        {showModal&&<ContactModal lang={lang} onClose={()=>setShowModal(false)}/>}
      </div>
    </LangContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
